name: Security & Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Lint, build, and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Fail only on high or critical vulnerabilities.
      # The project has a known moderate finding in Next.js's internal bundled
      # postcss; --audit-level=high keeps CI green while still catching real risks.
      - name: Audit dependencies
        run: npm audit --audit-level=high
